name: "Torqa Governance Gate"
description: "Run a Torqa scan on a workflow file and block the PR if the configured policy pack returns a BLOCK verdict."
author: "Torqa"
branding:
  icon: "shield"
  color: "blue"

inputs:
  api-key:
    description: "Torqa API key (starts with torqa_live_…). Provide via secret."
    required: true
  base-url:
    description: "Dashboard URL — e.g. https://dashboard.torqa.dev"
    required: false
    default: "https://dashboard.torqa.dev"
  source:
    description: "Source adapter: n8n | github | generic | webhook | pipedream | ai-agent | make | zapier | lambda"
    required: false
    default: "generic"
  workflow-file:
    description: "Path to the workflow JSON file to scan (relative to repo root)"
    required: true
  policy-pack-id:
    description: "Policy Pack v2 ID to evaluate findings against. Leave empty to use the engine's built-in posture."
    required: false
    default: ""
  fail-on:
    description: "Verdict that should fail the build: block | review | pass. Default: block."
    required: false
    default: "block"

outputs:
  verdict:
    description: "Final verdict: pass | review | block."
  request-id:
    description: "Torqa request id (cross-reference in audit timeline)."

runs:
  using: "composite"
  steps:
    - name: "Run Torqa scan + verdict"
      shell: bash
      env:
        TORQA_API_KEY: ${{ inputs.api-key }}
        TORQA_BASE_URL: ${{ inputs.base-url }}
        TORQA_SOURCE: ${{ inputs.source }}
        TORQA_WORKFLOW_FILE: ${{ inputs.workflow-file }}
        TORQA_PACK_ID: ${{ inputs.policy-pack-id }}
        TORQA_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/run.mjs"
