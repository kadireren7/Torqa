name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Verify torqa CLI on PATH
        run: torqa --version
      - name: Pytest
        run: python -m pytest
      - name: Self-host TORQA bundles (drift)
        run: python scripts/validate_self_host_bundles.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Vite build (generated webapp from golden IR)
        run: python scripts/ci_build_generated_webapp.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Verify torqa CLI on PATH
        run: torqa --version
      - name: Cargo test
        run: cargo test --manifest-path rust-core/Cargo.toml
      - name: Engine parity (Python vs Rust on golden IR)
        run: python -m pytest tests/test_engine_parity_ci.py -q
